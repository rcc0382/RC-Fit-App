      --candice-secondary: #b58cff;
      --candice-glow: rgba(0, 242, 173, 0.25);
    }
    
    body {
      background-color: var(--bg-dark);
      font-family: 'Inter', sans-serif;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(255,255,255,0.015) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(255,255,255,0.015) 0%, transparent 50%);

      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-glass);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);

    .glow-candice { border-color: rgba(0, 242, 173, 0.2); box-shadow: 0 0 20px var(--candice-glow), inset 0 0 10px rgba(0, 242, 173, 0.05); }

    .btn-press {
      transition: all 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent; 
    }
    .btn-press:active {

    // --- MAIN APP COMPONENT ---
    function App() {
      const [workoutsDb, setWorkoutsDb] = useState([]);
      const [customRoutines, setCustomRoutines] = useState(null);
      const [loading, setLoading] = useState(true);
      const [activeUsers, setActiveUsers] = useState([]);
      const [selectedRoutines, setSelectedRoutines] = useState({});
      const [view, setView] = useState('dashboard');
      const [savedSession, setSavedSession] = useState(null);
      const [editSession, setEditSession] = useState(null);
      const [showPlateCalc, setShowPlateCalc] = useState(false);
      const [showHeatmap, setShowHeatmap] = useState(null);

      const activeRoutines = customRoutines || DEFAULT_ROUTINES;

      // FORCE HARD REFRESH FUNCTION
      const forceRefresh = () => {
          localStorage.clear();
          if ('caches' in window) {
              caches.keys().then((names) => {
                  names.forEach(name => caches.delete(name));
              });
          }
          if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(registrations) {
                  for(let registration of registrations) {
                      registration.unregister();
                  }
              });
          }
          setTimeout(() => { window.location.reload(true); }, 500);
      };

      // FIREBASE SYNC EFFECT
      useEffect(() => {
        auth.signInAnonymously().catch(err => {
           console.warn("Mobile Browser Blocked Auth:", err.message);
        });

        // 1. Listen for workouts
        const unsubscribeWorkouts = db.collection('workouts')
          .orderBy('date', 'desc')
          .onSnapshot(snapshot => {
             const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
             setWorkoutsDb(data);
             setLoading(false);
          }, err => {
             console.error("Firestore Data Sync Error:", err);
             setLoading(false); 
          });

        // 2. Listen for active/paused session
        const unsubscribeSession = db.collection('app_state').doc('active_session')
          .onSnapshot(doc => {
             if (doc.exists) setSavedSession(doc.data());
             else setSavedSession(null);
          });

        // 3. Listen for custom routines builder overrides
        const unsubscribeRoutines = db.collection('app_state').doc('custom_routines')
          .onSnapshot(doc => {
             if (doc.exists && doc.data().routines) {
                 setCustomRoutines(doc.data().routines);
             } else {
                 setCustomRoutines(null);
             }
          });

        return () => {
           unsubscribeWorkouts();
           unsubscribeSession();
           unsubscribeRoutines();
        };
      }, []);

      const getNextWorkoutId = (username) => {
        const userHistory = workoutsDb.filter(w => w.user === username);
        if (userHistory.length === 0) return activeRoutines[0].id;
        
        const lastWorkoutId = userHistory[0].routineId;
        const currentIndex = activeRoutines.findIndex(r => r.id === lastWorkoutId);
        
        if (currentIndex === -1 || currentIndex === activeRoutines.length - 1) return activeRoutines[0].id;
        return activeRoutines[currentIndex + 1].id;
      };

      const startWorkout = (users, routines) => {
        setActiveUsers(users);
        setSelectedRoutines(routines);
        setView('workout');
      };

      const startEditWorkout = (session) => {
        setEditSession(session);
        setActiveUsers([session.user]);
        setSelectedRoutines({ [session.user]: session.routineId });
        setView('workout');
      };

      const resumeWorkout = () => {
        if (savedSession) {
           setActiveUsers(savedSession.users);
           setView('workout');
        }
      };

      const handleSaveProgress = (users, sessionData) => {
        const stateToSave = { users, sessionData };
        db.collection('app_state').doc('active_session').set(stateToSave).catch(console.error);
        setView('dashboard');
        setActiveUsers([]);
      };

      const clearSavedSession = () => {
        db.collection('app_state').doc('active_session').delete().catch(()=>{});
      };

      const handleFinishWorkout = async (workoutDataPayloads) => {
        try {
          if (editSession) {
              const payload = workoutDataPayloads[0];
              await db.collection('workouts').doc(editSession.id).update({
                  ...payload
              });
          } else {
              const batch = db.batch();
              for (const payload of workoutDataPayloads) {
                 const docRef = db.collection('workouts').doc(); 
                 batch.set(docRef, {
                   ...payload,
                   date: new Date().toISOString()
                 });
              }
              await batch.commit();
          }
          if (!editSession) clearSavedSession(); 
        } catch (err) {
          console.error("Error saving workout:", err);
          alert("Failed to upload session to Cloud. Please try again.");
        }
        setView('dashboard');
        setActiveUsers([]);
        setEditSession(null);
      };

      const handleCancelWorkout = () => {
         if (!editSession) clearSavedSession();
         setView('dashboard');
         setActiveUsers([]);
         setEditSession(null);
      };

      const handleSaveRoutines = async (newRoutines) => {
        try {
            await db.collection('app_state').doc('custom_routines').set({ routines: newRoutines });
            setView('dashboard');
        } catch (err) {
            console.error(err);
            alert("Failed to save protocol to cloud.");
        }
      };

      if (loading) return (
        <div className="min-h-screen flex flex-col items-center justify-center text-neutral-300 bg-[#121212]">
          <div className="w-12 h-12 border-4 border-indigo-500/30 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
          <p className="font-header text-xl tracking-widest text-neutral-500">SYNCING CLOUD DATA...</p>
        </div>
      );

      return (
        <div className="min-h-screen bg-neutral-950 text-neutral-100 p-4 md:p-6 pb-20 font-sans relative">
          {view === 'dashboard' && (
            <Dashboard 
               workoutsDb={workoutsDb} 
               onStart={startWorkout} 
               getNextWorkoutId={getNextWorkoutId} 
               savedSession={savedSession}
               onResume={resumeWorkout}
               onEditSession={startEditWorkout}
               onTogglePlateCalc={() => setShowPlateCalc(true)}
               onToggleHeatmap={(user) => setShowHeatmap(user)}
               forceRefresh={forceRefresh}
               activeRoutines={activeRoutines}
               onEditProtocol={() => setView('builder')}
            />
          )}
          {view === 'workout' && (
            <ActiveWorkout 
               users={activeUsers} 
               selectedRoutines={selectedRoutines}
               workoutsDb={workoutsDb} 
               onFinish={handleFinishWorkout} 
               onSaveProgress={handleSaveProgress}
               onCancel={handleCancelWorkout} 
               initialSessionData={savedSession && savedSession.users.join(',') === activeUsers.join(',') ? savedSession.sessionData : null}
               editSession={editSession}
               onTogglePlateCalc={() => setShowPlateCalc(true)}
               activeRoutines={activeRoutines}
            />
          )}
          {view === 'builder' && (
            <RoutineBuilder 
               routines={activeRoutines}
               onSave={handleSaveRoutines}
               onCancel={() => setView('dashboard')}
            />
          )}

          {showPlateCalc && <PlateLoaderModal onClose={() => setShowPlateCalc(false)} />}
          {showHeatmap && <RecoveryHeatmapModal user={showHeatmap} workoutsDb={workoutsDb} onClose={() => setShowHeatmap(null)} />}
        </div>
      );
    }

    // --- RECOVERY HEATMAP COMPONENT ---
    function RecoveryHeatmapModal({ user, workoutsDb, onClose }) {
       const fatigueMap = useMemo(() => {
          const map = {};
          const now = new Date().getTime();
          
          const userWorkouts = workoutsDb.filter(w => w.user === user).sort((a,b) => new Date(b.date) - new Date(a.date));
          
          const allMuscles = ['Chest', 'Front Delts', 'Side Delts', 'Rear Delts', 'Triceps', 'Biceps', 'Forearms', 'Lats', 'Traps', 'Lower Back', 'Quads', 'Hamstrings', 'Glutes', 'Calves', 'Rectus Abdominis', 'Transverse Abdominis', 'Core_IAP'];
          allMuscles.forEach(m => map[m] = { fatigue: 0, lastHit: null, rpe: 0 });

          userWorkouts.forEach(workout => {
             const workoutDate = new Date(workout.date).getTime();
             const hoursElapsed = (now - workoutDate) / (1000 * 60 * 60);
             
             if (hoursElapsed > 168) return;

             Object.entries(workout.exercises).forEach(([exName, exData]) => {
                const rpe = parseFloat(exData.rpe) || 7; 
                const muscles = EXERCISE_MUSCLE_MAP[exName] || [];
                
                muscles.forEach(muscle => {
                   if (map[muscle] && map[muscle].lastHit === null) {
                      map[muscle].lastHit = workoutDate;
                      map[muscle].rpe = rpe;
                      
                      let baseFatigue = rpe * 10; 
                      let currentFatigue = Math.max(0, baseFatigue * (1 - (hoursElapsed / 72)));
                      map[muscle].fatigue = currentFatigue;
                   }
                });
             });
          });

          return map;
       }, [workoutsDb, user]);

       const getColor = (fatigue) => {
          if (fatigue > 75) return '#ef4444'; // Red

                   <div>
                      <h2 className="text-2xl font-header tracking-wide text-white flex items-center">

                            )}

                      )}

                      <div className="glass-card rounded-xl p-4 flex-1 overflow-y-auto max-h-[300px]">
                         <h4 className="text-xs font-bold text-neutral-500 uppercase tracking-widest mb-4">Muscle Status</h4>
                         <div className="space-y-3">
                            {Object.entries(fatigueMap)
                               .filter(([m, d]) => d.lastHit !== null && m !== 'Core_IAP')
                               .sort((a,b) => b[1].fatigue - a[1].fatigue)
                               .map(([muscle, data]) => {
                                  const color = getColor(data.fatigue);
                                  const hours = Math.round((new Date().getTime() - data.lastHit) / (1000 * 60 * 60));
                                  return (
                                     <div key={muscle} className="flex items-center justify-between">
                                        <div>
                                           <span className="text-sm font-medium text-neutral-200 block">{muscle}</span>
                                           <span className="text-[10px] text-neutral-500">{hours} hrs ago • RPE {data.rpe}</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                           <span className="text-xs font-mono font-bold" style={{color}}>{Math.round(data.fatigue)}%</span>
                                        </div>
                                     </div>
                                  )
                               })
                            }
                         </div>
                      </div>
                   </div>
                </div>
             </div>
          </div>
       );
    }

          { name: 'Candice Barbell', weight: 35 },
          { name: 'Short Bar', weight: 35 },
          { name: 'Kabuki Transformer', weight: 55 },
          { name: 'Prime Trap Bar', weight: 73 }

          35:   { color: 'bg-yellow-500', height: 'h-32', width: 'w-5', border: 'border-yellow-400', labelColor: 'text-black font-bold', text: 'text-xs' },
          25:   { color: 'bg-green-600', height: 'h-24', width: 'w-5', border: 'border-green-500', labelColor: 'text-white font-bold', text: 'text-[10px]' },
          10:   { color: 'bg-neutral-800', height: 'h-16', width: 'w-4', border: 'border-neutral-600', labelColor: 'text-white font-bold', text: 'text-[9px]' },
          5:    { color: 'bg-neutral-800', height: 'h-12', width: 'w-3', border: 'border-neutral-600', labelColor: 'text-white font-bold', text: 'text-[8px]' },

                      <div className="flex-1">

                      <div className="flex-1">
                         <label className="text-[10px] text-neutral-500 font-bold tracking-widest uppercase block mb-1">Barbell</label>
                         <select 
                            value={barWeight} 
                            onChange={e => setBarWeight(parseFloat(e.target.value))}

                   </div>

                   <div className="glass-card bg-black/40 rounded-2xl h-48 mb-6 flex flex-col justify-center relative overflow-hidden shadow-inner">
                      {target && parseFloat(target) > barWeight ? (
                         <div className="w-full flex items-center justify-start relative px-4 pt-4 overflow-x-auto min-w-full">
                            {/* Inner Collar */}
                            <div className="w-8 h-24 bg-gradient-to-r from-neutral-600 to-neutral-400 rounded-sm shadow-xl z-10 shrink-0 border-y border-l border-neutral-300" />
                            
                            {/* Plates */}
                            <div className="flex items-center gap-[1px] z-20 shrink-0">
                               {loadedPlates.map((p, i) => (
                                  <div key={i} className={`flex items-center justify-center rounded-[3px] shadow-[2px_0_5px_rgba(0,0,0,0.8)] border-y border-x-2 ${plateStyles[p].height} ${plateStyles[p].width} ${plateStyles[p].color} ${plateStyles[p].border}`}>
                                     <span className={`${plateStyles[p].labelColor} ${plateStyles[p].text} -rotate-90 block`}>{p}</span>
                                  </div>
                               ))}

                            {/* The Metal Sleeve */}
                            <div className="absolute left-[40px] right-0 h-8 bg-gradient-to-b from-neutral-400 via-neutral-300 to-neutral-500 shadow-inner z-0 border-y border-neutral-500 rounded-r-md" />

                      ) : (
                         <div className="text-center text-neutral-500 font-mono text-sm">AWAITING TARGET...</div>
                      )}

                      <div className="glass-card rounded-xl p-4">
                         <h4 className="text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-2">Load Per Sleeve</h4>
                         <div className="flex flex-wrap gap-2">
                            {Object.entries(plateBreakdown).sort((a,b) => b[0] - a[0]).map(([weight, count]) => (
                               <span key={weight} className="bg-black/50 border border-white/10 px-3 py-1.5 rounded-lg text-white font-mono text-sm shadow-sm">
                                  <span className="text-amber-400 mr-1">{count}x</span> {weight} lbs

                         </div>
                      </div>
                   )}
                </div>
             </div>
          </div>

    }

    // --- CUSTOM SVG VOLUME CHART ---
    function VolumeChart({ data, strokeColor }) {
      if (!data || data.length === 0) {
        return <div className="h-20 flex items-center justify-center text-neutral-600 text-xs italic font-mono">No data</div>;
      }
      
      if (data.length === 1) {
         return (
            <svg className="w-full h-20 overflow-visible mt-2" viewBox="0 0 100 100" preserveAspectRatio="none">
               <circle cx="50" cy="50" r="4" fill={strokeColor} style={{filter: `drop-shadow(0 0 6px ${strokeColor})`}} />
            </svg>
         );
      }
      
      const maxVol = Math.max(...data.map(d => d.volume));
      const minVol = Math.min(...data.map(d => d.volume));
      const range = maxVol - minVol || 1;
      
      const points = data.map((d, i) => {
        const x = (i / (data.length - 1)) * 100;
        const y = 100 - (((d.volume - minVol) / range) * 80 + 10);
        return `${x},${y}`;
      }).join(' ');

      return (
        <svg className="w-full h-20 overflow-visible mt-2 drop-shadow-xl" viewBox="0 0 100 100" preserveAspectRatio="none">
           <polyline points={points} fill="none" stroke={strokeColor} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" style={{filter: `drop-shadow(0 0 4px ${strokeColor})`}} />
           {data.map((d, i) => {
             const x = (i / (data.length - 1)) * 100;
             const y = 100 - (((d.volume - minVol) / range) * 80 + 10);
             return <circle key={i} cx={x} cy={y} r="3.5" fill="#121212" stroke={strokeColor} strokeWidth="2" />
           })}
        </svg>
      );
    }

    // --- SESSION (WEEKLY) ANALYTICS WIDGET ---
    function SessionAnalytics({ user, workoutsDb, themeColor }) {
       const weeklyData = useMemo(() => {
          const userWorkouts = workoutsDb.filter(w => w.user === user).sort((a,b) => new Date(a.date) - new Date(b.date));
          const weeksMap = {};
          
          userWorkouts.forEach(w => {
             const d = new Date(w.date);
             const day = d.getDay();
             const diff = d.getDate() - day + (day === 0 ? -6 : 1);
             const monday = new Date(d);
             monday.setDate(diff);
             monday.setHours(0,0,0,0);
             
             const weekKey = monday.getTime();
             
             let vol = 0;
             Object.values(w.exercises).forEach(exData => {
                const sets = Array.isArray(exData) ? exData : (exData.sets || []);
                sets.forEach(s => vol += (parseFloat(s.weight||0) * parseInt(s.reps||0)));
             });
             
             if (!weeksMap[weekKey]) {
                weeksMap[weekKey] = { date: weekKey, volume: 0 };
             }
             weeksMap[weekKey].volume += vol;
          });
          
          return Object.values(weeksMap).sort((a,b) => a.date - b.date);
       }, [workoutsDb, user]);

       let currentVol = 0;
       let prevVol = 0;
       let percentChange = 0;

       if (weeklyData.length > 0) {
          currentVol = weeklyData[weeklyData.length - 1].volume;
          if (weeklyData.length > 1) {
             prevVol = weeklyData[weeklyData.length - 2].volume;
             percentChange = prevVol > 0 ? ((currentVol - prevVol) / prevVol) * 100 : 0;
          }
       }

       return (
          <div className="glass-card rounded-2xl p-5 mb-6">
             <div className="flex items-center justify-between mb-6">
                <h3 className="text-sm font-bold text-white/50 flex items-center uppercase tracking-widest">
                   <IconTrendingUp size={16} className="mr-2" style={{color: themeColor}} /> Volume
                </h3>
             </div>
             
             {weeklyData.length === 0 ? (
                <div className="text-center text-white/30 text-sm font-mono py-4">NO DATA</div>
             ) : (
                <>
                   <div className="flex justify-between items-end mb-2">
                      <div>
                         <div className="text-[10px] text-white/50 font-bold tracking-widest uppercase mb-1">This Week</div>
                         <div className="text-3xl font-header tracking-wide text-white leading-none">{currentVol.toLocaleString()} <span className="text-sm font-sans text-white/40 tracking-normal">LBS</span></div>
                      </div>
                      {weeklyData.length > 1 && (
                         <div className={`text-sm font-mono font-bold flex items-center ${percentChange >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                            {percentChange > 0 ? '+' : ''}{percentChange.toFixed(1)}%
                         </div>
                      )}
                   </div>
                   
                   <VolumeChart data={weeklyData} strokeColor={themeColor} />
                </>
             )}
          </div>
       );
    }

    // --- ACTIVITY RINGS COMPONENT ---
    const ActivityRings = ({ user, workoutsDb, primary, targetCals }) => {
       const isRobby = user === 'Robby';
       
       const { currentCals, averageFatigue } = useMemo(() => {
          const now = new Date().getTime();
          const userWorkouts = workoutsDb.filter(w => w.user === user).sort((a,b) => new Date(b.date) - new Date(a.date));
          
          let cals = 0;
          let totalFatigue = 0;
          const allMuscles = ['Chest', 'Front Delts', 'Side Delts', 'Rear Delts', 'Triceps', 'Biceps', 'Lats', 'Traps', 'Lower Back', 'Quads', 'Hamstrings', 'Glutes', 'Calves'];
          const lastHitMap = {};
          
          const liftBurn = isRobby ? 450 : 300;
          const cardioRate = isRobby ? 14 : 10; 

          userWorkouts.forEach(workout => {
             const workoutDate = new Date(workout.date).getTime();
             const hoursElapsed = (now - workoutDate) / (1000 * 60 * 60);
             if (hoursElapsed > 168) return;

             cals += liftBurn;
             if (workout.cardioType && workout.cardioDuration) {
                 cals += parseFloat(workout.cardioDuration) * cardioRate;
             }

             Object.entries(workout.exercises).forEach(([exName, exData]) => {
                const rpe = parseFloat(exData.rpe) || 7; 
                const muscles = EXERCISE_MUSCLE_MAP[exName] || [];
                muscles.forEach(muscle => {
                   if (allMuscles.includes(muscle) && !lastHitMap[muscle]) {
                      lastHitMap[muscle] = true;
                      let baseFatigue = rpe * 10; 
                      let currentFatigue = Math.max(0, baseFatigue * (1 - (hoursElapsed / 72)));
                      totalFatigue += currentFatigue;
                   }
                });
             });
          });

          return { 
              currentCals: cals,
              averageFatigue: Math.min(100, Math.round(totalFatigue / allMuscles.length))
          };
       }, [workoutsDb, user, isRobby]);
       
       const outerCircumference = 251;
       const innerCircumference = 163;
       
       const cappedCals = Math.min(currentCals, targetCals); 
       const outerOffset = outerCircumference - ((cappedCals / targetCals) * outerCircumference);
       const innerOffset = innerCircumference - ((averageFatigue / 100) * innerCircumference);
       
       let fatigueColor = '#22c55e'; // Green
       if (averageFatigue > 25) fatigueColor = '#eab308'; // Yellow
       if (averageFatigue > 50) fatigueColor = '#f97316'; // Orange
       if (averageFatigue > 75) fatigueColor = '#ef4444'; // Red

       return (
          <div className="flex items-center gap-4 py-2">
            <div className="relative w-16 h-16 shrink-0">
              <svg className="-rotate-90 w-full h-full" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="8" />
                <circle cx="50" cy="50" r="40" fill="none" stroke={primary} strokeWidth="8" strokeDasharray={outerCircumference} strokeDashoffset={outerOffset} strokeLinecap="round" style={{ filter: `drop-shadow(0 0 4px ${primary})`, transition: 'stroke-dashoffset 1s ease-out'}} />
                <circle cx="50" cy="50" r="26" fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="8" />
                <circle cx="50" cy="50" r="26" fill="none" stroke={fatigueColor} strokeWidth="8" strokeDasharray={innerCircumference} strokeDashoffset={innerOffset} strokeLinecap="round" style={{ filter: `drop-shadow(0 0 4px ${fatigueColor})`, transition: 'stroke-dashoffset 1s ease-out'}} />
              </svg>
              <div className="absolute inset-0 flex items-center justify-center">
                <IconActivity size={14} className="text-white/60" />
              </div>
            </div>
            <div className="flex flex-col justify-center">
              <span className="font-header text-3xl leading-none text-white tracking-wide">{currentCals.toLocaleString()} <span className="text-xs text-white/40 tracking-normal font-sans">KCAL</span></span>
              <span className="font-mono text-sm font-bold mt-1" style={{color: fatigueColor}}>{averageFatigue}% <span className="text-[10px] text-white/40 font-normal font-sans">FATIGUE</span></span>
            </div>
          </div>
       );
    };

    // --- TIMELINE COMPONENT ---

        <div className="relative flex items-center justify-between w-full mt-4 mb-6 z-10 px-2">

    // --- WORKBOOK SPREADSHEET MODAL ---
    function SpreadsheetModal({ workoutsDb, userToShow, onClose, onEditSession, activeRoutines }) {
       const userWorkouts = useMemo(() => workoutsDb.filter(w => w.user === userToShow), [workoutsDb, userToShow]);
       const routineOrder = activeRoutines.map(r => r.id);
       
       const routines = useMemo(() => {
          const allRoutines = Array.from(new Set(userWorkouts.map(w => w.routineId)));
          return allRoutines.sort((a, b) => {
             const idxA = routineOrder.indexOf(a);
             const idxB = routineOrder.indexOf(b);
             return (idxA === -1 ? 99 : idxA) - (idxB === -1 ? 99 : idxB);
          });
       }, [userWorkouts, routineOrder]);

       const themeText = userToShow === 'Robby' ? 'text-[var(--robby-primary)]' : 'text-[var(--candice-primary)]';
       const themeTextHover = userToShow === 'Robby' ? 'hover:text-[var(--robby-primary)]' : 'hover:text-[var(--candice-primary)]';

       return (
          <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[60] p-4 sm:p-8" onClick={onClose}>
             <div className="glass-card rounded-2xl w-full max-w-7xl max-h-[90vh] flex flex-col shadow-2xl" onClick={e => e.stopPropagation()}>
                <div className="p-5 border-b border-white/10 flex justify-between items-center bg-black/40">
                   <div>
                      <h2 className="text-3xl font-header tracking-wide text-white flex items-center"><IconTable size={24} className={`mr-3 ${themeText}`}/> {userToShow}'s Data Log</h2>
                      <p className="text-xs font-mono text-white/50 mt-1 uppercase tracking-widest">Click any date to modify entry.</p>
                   </div>
                   <button onClick={onClose} className="text-white/50 hover:text-white bg-black/50 p-2 rounded-full transition-colors btn-press"><IconX size={20} /></button>
                </div>
                
                <div className="overflow-auto flex-1 p-4 sm:p-6 bg-black/20 space-y-12 pb-24">
                   {routines.length === 0 ? (
                      <div className="text-center text-white/30 font-mono text-sm mt-10">NO DATA</div>
                   ) : (
                      routines.map(routineName => {
                         const sessions = userWorkouts
                            .filter(w => w.routineId === routineName)
                            .sort((a, b) => new Date(a.date) - new Date(b.date)); 
                         
                         const dates = sessions.map(s => ({ 
                            id: s.id, 
                            dateStr: new Date(s.date).toLocaleDateString(undefined, {month: 'numeric', day: 'numeric', year: '2-digit'}),
                            session: s 
                         }));
                         
                         const exerciseSet = new Set();
                         sessions.forEach(s => Object.keys(s.exercises).forEach(e => exerciseSet.add(e)));
                         let exercises = Array.from(exerciseSet);

                         const routineDef = activeRoutines.find(r => r.id === routineName);
                         if (routineDef) {
                            const exOrder = {};
                            routineDef.exercises.forEach((ex, i) => exOrder[ex.name] = i);
                            CANDICE_CORE.exercises.forEach((ex, i) => exOrder[ex.name] = i + 100); 
                            exercises.sort((a, b) => (exOrder[a] ?? 999) - (exOrder[b] ?? 999));
                         }

                         const rows = exercises.map(exName => {
                            const cells = sessions.map(s => {
                               const exData = s.exercises[exName];
                               const sets = Array.isArray(exData) ? exData : (exData?.sets || []);

                               if (!sets || sets.length === 0) return '-';
                               const allSame = sets.every(set => set.weight === sets[0].weight && set.reps === sets[0].reps);
                               if (allSame) return `${sets.length}s: ${sets[0].weight}x${sets[0].reps}`;
                               return sets.map(set => `${set.weight}x${set.reps}`).join(', ');
                            });
                            return { exercise: exName, cells, isCardio: false };
                         });

                         // Add Cardio Row at bottom if any session logged it
                         const hasCardio = sessions.some(s => s.cardioType && s.cardioDuration);
                         if (hasCardio) {
                             const cardioCells = sessions.map(s => {
                                 if (s.cardioType && s.cardioDuration) return `${s.cardioType} (${s.cardioDuration}m)`;
                                 return '-';
                             });
                             rows.push({ exercise: 'CARDIO (OPTIONAL)', cells: cardioCells, isCardio: true });
                         }

                         return (
                            <div key={routineName} className="glass-card rounded-xl overflow-hidden shadow-lg border border-white/5">
                               <div className="bg-black/50 p-4 border-b border-white/5">
                                  <h3 className="text-xl font-header text-white tracking-widest">{routineName}</h3>
                               </div>
                               <div className="overflow-x-auto">
                                  <table className="w-full text-left border-collapse text-sm whitespace-nowrap">
                                     <thead className="bg-black/40 shadow-sm">
                                        <tr>
                                           <th className="p-3 font-bold text-white/50 text-[10px] uppercase tracking-widest border-b border-r border-white/5 sticky left-0 bg-black/80 z-10 min-w-[200px]">Exercise</th>
                                           {dates.map(d => (
                                              <th key={d.id} className="p-3 font-bold text-white/50 text-xs uppercase tracking-widest border-b border-r border-white/5 text-center min-w-[120px] align-top">
                                                 <button onClick={() => onEditSession(d.session)} className={`group flex flex-col items-center mx-auto transition-colors ${themeTextHover}`}>
                                                    <span className="font-mono">{d.dateStr}</span>
                                                    <span className="text-[9px] font-sans font-bold uppercase mt-1 opacity-0 group-hover:opacity-100 flex items-center transition-opacity bg-white/10 px-2 py-0.5 rounded text-white"><IconEdit size={10} className="mr-1"/> Edit</span>
                                                 </button>
                                              </th>
                                           ))}
                                        </tr>
                                     </thead>
                                     <tbody className="divide-y divide-white/5">
                                        {rows.map((row, idx) => (
                                           <tr key={idx} className={`hover:bg-white/5 transition-colors group ${row.isCardio ? 'border-t-2 border-white/20 bg-white/5' : ''}`}>
                                              <td className={`p-3 font-medium border-r border-white/5 sticky left-0 bg-[#151515]/95 backdrop-blur z-10 group-hover:bg-[#1a1a1a] transition-colors truncate max-w-[250px] ${row.isCardio ? themeText : 'text-white/90'}`} title={row.exercise}>
                                                 {row.exercise}
                                              </td>
                                              {row.cells.map((cell, cIdx) => (
                                                 <td key={cIdx} className={`p-3 font-mono text-[11px] border-r border-white/5 text-center transition-colors ${row.isCardio ? 'text-white/80' : 'text-white/60 group-hover:text-white'}`}>
                                                    {cell}
                                                 </td>
                                              ))}
                                           </tr>
                                        ))}
                                     </tbody>
                                  </table>
                               </div>
                            </div>
                         );
                      })
                   )}
                </div>
             </div>
          </div>
       );

                 updated[activeTab].exercises.push({ name: '', targetSets: 3, targetReps: '8-12', notes: '' });
                 setEditableRoutines(updated);
              }} className="mt-6 w-full py-4 glass-card border border-dashed border-white/20 text-white/50 hover:text-white hover:border-white/50 rounded-xl flex items-center justify-center font-bold tracking-widest uppercase text-xs transition-all btn-press">
                 + Add New Movement
              </button>
           </div>
        </div>
      )
    }

    function ActiveWorkout({ users, selectedRoutines, workoutsDb, onFinish, onSaveProgress, onCancel, initialSessionData, editSession, onTogglePlateCalc, activeRoutines }) {
      const [sessionData, setSessionData] = useState(() => {
        if (initialSessionData && !editSession) return initialSessionData;

        const initialState = {};
        users.forEach(username => {
          const routineId = selectedRoutines[username];
          const routine = activeRoutines.find(r => r.id === routineId);
          const exercisesState = {};
          
          const userHistory = workoutsDb.filter(w => w.user === username && w.routineId === routineId).sort((a,b) => new Date(b.date) - new Date(a.date));
          const lastSession = userHistory.length > 0 ? userHistory[0] : null;

          const setupEx = (ex, isCore) => {
             if (editSession && editSession.user === username) {
                 const exData = editSession.exercises[ex.name];
                 if (exData) {
                     const sets = Array.isArray(exData) ? exData : (exData.sets || []);
                     exercisesState[ex.name] = { 
                         weight: sets[0]?.weight || '', 
                         reps: sets[0]?.reps || '', 
                         rpe: exData.rpe || '',
                         targetSets: sets.length || ex.targetSets, 
                         note: exData.note || '', 
                         recWeight: exData.recWeight || '', 
                         recReps: exData.recReps || '', 
                         pastRecWeight: '', 
                         pastRecReps: '' 
                     };
                     return;
                 }
             }

             let prevNote = '';
             let pastRecWeight = '';
             let pastRecReps = '';

             if (lastSession && lastSession.exercises[ex.name]) {
                 const prevData = lastSession.exercises[ex.name];
                 if (!Array.isArray(prevData)) {
                     prevNote = prevData.note || '';
                     pastRecWeight = prevData.recWeight || '';
                     pastRecReps = prevData.recReps || '';
                 }
             }

             exercisesState[ex.name] = { 
                 weight: isCore ? 'BW' : '', 
                 reps: '', 
                 rpe: '',
                 targetSets: ex.targetSets, 
                 note: prevNote, 
                 recWeight: '', 
                 recReps: '', 
                 pastRecWeight, 
                 pastRecReps 
             };
          };

          routine.exercises.forEach(ex => setupEx(ex, false));

          if (username === 'Candice') {
             CANDICE_CORE.exercises.forEach(ex => setupEx(ex, true));
          }

          initialState[username] = { 
             routineId, 
             exercises: exercisesState,
             cardioType: editSession?.cardioType || '',
             cardioDuration: editSession?.cardioDuration || ''
          };
        });
        return initialState;
      });

      const [enlargedImage, setEnlargedImage] = useState(null);

      const updateExercise = (username, exerciseName, field, value) => {
        setSessionData(prev => {
          const updated = { ...prev };
          updated[username].exercises[exerciseName][field] = value;
          return updated;
        });
      };

      const handleSave = () => {
         onSaveProgress(users, sessionData);
      };

      const submitWorkout = () => {
        const payloads = users.map(username => {
          const cleanedExercises = {};
          Object.entries(sessionData[username].exercises).forEach(([exName, exData]) => {
            if (exData.weight !== '' && exData.reps !== '') {
               cleanedExercises[exName] = {
                  sets: Array(exData.targetSets).fill({ weight: exData.weight, reps: exData.reps }),
                  rpe: exData.rpe,
                  note: exData.note,
                  recWeight: exData.recWeight,
                  recReps: exData.recReps
               };
            }
          });
          return { 
             user: username, 
             routineId: sessionData[username].routineId, 
             exercises: cleanedExercises,
             cardioType: sessionData[username].cardioType,
             cardioDuration: sessionData[username].cardioDuration
          };
        });
        
        const hasData = payloads.some(p => Object.keys(p.exercises).length > 0 || (p.cardioType && p.cardioDuration));
        if (hasData) onFinish(payloads);
        else onCancel(); 
      };

      return (
        <div className="max-w-[1600px] mx-auto relative">
          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4 sticky top-0 bg-[#121212]/90 backdrop-blur-md z-50 py-3 border-b border-white/5">
            <button onClick={onCancel} className="text-white/40 hover:text-red-400 transition-colors text-sm font-bold uppercase tracking-widest text-left btn-press">
               {editSession ? '< Cancel Edit' : '< Abort'}
            </button>
            <div className="flex gap-3 w-full sm:w-auto">
              <button 
                 onClick={onTogglePlateCalc} 
                 className="flex-1 sm:flex-none glass-card hover:bg-white/10 text-white px-3 py-2 rounded-lg font-bold transition-all flex items-center justify-center text-xs sm:text-sm btn-press"
              >
                 <IconCalculator size={16} className="mr-2 text-amber-400" /> Plates
              </button>
              {!editSession && (
                 <button onClick={handleSave} className="flex-1 sm:flex-none glass-card hover:bg-white/10 text-white px-3 py-2 rounded-lg font-bold transition-all flex items-center justify-center text-xs sm:text-sm btn-press">
                   <IconSave size={16} className="mr-2 text-white/50" /> Pause
                 </button>
              )}
              {editSession ? (
                 <button onClick={submitWorkout} className="flex-1 sm:flex-none bg-white text-black px-6 py-2 rounded-lg font-bold shadow-[0_0_15px_rgba(255,255,255,0.3)] transition-all flex items-center justify-center text-xs sm:text-sm btn-press">
                   <IconEdit size={16} className="mr-2" /> Override Entry
                 </button>
              ) : (
                 <button onClick={submitWorkout} className="flex-1 sm:flex-none bg-white text-black px-6 py-2 rounded-lg font-bold shadow-[0_0_15px_rgba(255,255,255,0.3)] transition-all flex items-center justify-center text-xs sm:text-sm btn-press">
                   <IconCheck size={16} className="mr-2" /> Log Telemetry
                 </button>
              )}
            </div>
          </div>

          <div className={`grid grid-cols-1 ${users.length === 2 ? 'xl:grid-cols-2 gap-6' : 'max-w-2xl mx-auto'} items-start`}>
            {users.map(username => {
              const routineId = sessionData[username].routineId;
              const routine = activeRoutines.find(r => r.id === routineId);
              const theme = username === 'Robby' 
                ? { primary: 'var(--robby-primary)', glowClass: 'glow-robby', textClass: 'text-[var(--robby-primary)]', focusRing: 'focus:border-[var(--robby-primary)] focus:ring-[var(--robby-primary)]' }
                : { primary: 'var(--candice-primary)', glowClass: 'glow-candice', textClass: 'text-[var(--candice-primary)]', focusRing: 'focus:border-[var(--candice-primary)] focus:ring-[var(--candice-primary)]' };

              return (
                <div key={username} className={`glass-card rounded-2xl overflow-hidden flex flex-col shadow-2xl ${theme.glowClass}`}>
                  <div className="p-4 md:p-5 border-b border-white/10 relative overflow-hidden bg-black/40">
                    <div className="flex items-center gap-3 relative z-10 mb-1">
                       <h2 className="text-3xl md:text-4xl font-header tracking-widest text-white leading-none">{username}</h2>
                       {editSession && <span className="bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-widest border border-amber-500/30">Editing</span>}
                    </div>
                    <div className={`${theme.textClass} font-mono font-bold text-[10px] md:text-xs tracking-widest relative z-10`}>{routine.id} SEQUENCE</div>
                  </div>

                  <div className="p-3 md:p-4 space-y-4 bg-black/20">
                    {routine.exercises.map((exercise, index) => (
                      <ExerciseBlock 
                          key={exercise.name} 
                          username={username} 
                          exercise={exercise} 
                          state={sessionData[username].exercises[exercise.name]} 
                          workoutsDb={workoutsDb} 
                          updateExercise={updateExercise} 
                          theme={theme} 
                          number={index + 1} 
                          editSessionId={editSession?.id} 
                          onOpenImage={setEnlargedImage}
                      />
                    ))}

                    {username === 'Candice' && (
                      <div className="mt-6 border-t border-white/10 pt-6">
                        <div className="mb-4 flex items-center">
                          <div className="bg-[var(--candice-primary)]/20 p-2 rounded-lg mr-3"><IconCheckCircle size={18} className="text-[var(--candice-primary)]" /></div>
                          <div>
                            <h3 className="text-xl md:text-2xl font-header tracking-widest text-white leading-none">{CANDICE_CORE.title}</h3>
                            <p className="text-[10px] font-mono text-white/50 mt-1 uppercase tracking-widest">Targeted Recovery</p>
                          </div>
                        </div>
                        <div className="space-y-4">
                          {CANDICE_CORE.exercises.map((exercise, index) => (
                            <ExerciseBlock 
                                key={exercise.name} 
                                username={username} 
                                exercise={exercise} 
                                state={sessionData[username].exercises[exercise.name]} 
                                workoutsDb={workoutsDb} 
                                updateExercise={updateExercise} 
                                theme={theme} 
                                number={routine.exercises.length + index + 1} 
                                isCore={true} 
                                editSessionId={editSession?.id} 
                                onOpenImage={setEnlargedImage}
                            />
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Optional Cardio Block */}
                    <div className="mt-4 border-t border-white/10 pt-4">
                       <div className="flex items-center mb-3">
                          <IconActivity size={18} className={theme.textClass} />
                          <h3 className="text-lg font-header tracking-widest text-white ml-2">Optional Cardio</h3>
                       </div>
                       <div className="flex flex-wrap gap-3">
                          <select 
                             value={sessionData[username].cardioType || ''} 
                             onChange={e => setSessionData(prev => ({...prev, [username]: {...prev[username], cardioType: e.target.value}}))}
                             className="flex-1 bg-black/40 border border-white/10 rounded-lg p-2.5 text-xs font-bold tracking-wider text-white/80 focus:outline-none focus:border-white/30"
                          >
                             <option value="">None Logged</option>
                             <option value="Treadmill">Treadmill</option>
                             <option value="Row Machine">Row Machine</option>
                             <option value="Rucking / Weighted Walk">Rucking / Weighted Walk</option>
                          </select>
                          <input 
                             type="number" 
                             value={sessionData[username].cardioDuration || ''}
                             onChange={e => setSessionData(prev => ({...prev, [username]: {...prev[username], cardioDuration: e.target.value}}))}
                             placeholder="Minutes"
                             className="w-24 bg-black/40 border border-white/10 rounded-lg p-2.5 text-white font-mono text-sm text-center focus:outline-none focus:border-white/30"
                          />
                       </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Enlarged Image Modal */}
          {enlargedImage && (
             <div className="fixed inset-0 bg-black/95 backdrop-blur-lg z-[200] flex items-center justify-center p-4 sm:p-8" onClick={() => setEnlargedImage(null)}>
                <div className="w-full max-w-3xl flex flex-col relative" onClick={e => e.stopPropagation()}>
                   <div className="flex justify-between items-start mb-4 shrink-0">
                      <div>
                         <h2 className="text-3xl sm:text-4xl font-header tracking-widest text-white leading-none drop-shadow-md">{enlargedImage.name}</h2>
                         <div className={`inline-block mt-2 px-3 py-1 rounded bg-white/10 ${enlargedImage.theme.textClass} border border-white/10 font-mono text-xs font-bold tracking-widest uppercase shadow-sm`}>
                            Form & Technique Guide
                         </div>
                      </div>
                      <button onClick={() => setEnlargedImage(null)} className="text-white/50 hover:text-white bg-white/5 hover:bg-white/10 p-3 rounded-full transition-all btn-press backdrop-blur-sm border border-white/10">
                         <IconX size={24} />
                      </button>
                   </div>
                   <div className="glass-card rounded-2xl border border-white/10 relative overflow-hidden bg-[#050505]">
                      <img src={enlargedImage.src} alt={enlargedImage.name} className="w-full aspect-video object-cover opacity-80" />
                      <div className="absolute inset-0 shadow-[inset_0_0_100px_rgba(0,0,0,0.9)] pointer-events-none z-10"></div>
                      <div className="relative z-20 w-full p-4 sm:p-6 bg-gradient-to-t from-black via-black/80 to-black/40 border-t border-white/5 shrink-0">
                         <div className="flex items-start gap-3">
                            <IconInfo size={24} className={`${enlargedImage.theme.textClass} shrink-0 mt-1 drop-shadow-md`} />
                            <div>
                               <h4 className="text-[10px] font-bold text-white/50 uppercase tracking-widest mb-1 font-mono">Execution Cues</h4>
                               <p className="text-lg sm:text-xl text-white font-bold leading-tight tracking-wide drop-shadow-md">
                                  {enlargedImage.notes}
                               </p>
                            </div>
                         </div>
                      </div>
                   </div>
                </div>
             </div>
          )}
        </div>
      );
    }

    function ExerciseBlock({ username, exercise, state, workoutsDb, updateExercise, theme, number, isCore = false, editSessionId, onOpenImage }) {
      const lastSessionData = useMemo(() => {
        const userHistory = workoutsDb.filter(w => w.user === username && w.id !== editSessionId).sort((a,b) => new Date(b.date) - new Date(a.date));
        for (const session of userHistory) {
          if (session.exercises && session.exercises[exercise.name]) {
            const exData = session.exercises[exercise.name];
            const sets = Array.isArray(exData) ? exData : (exData.sets || []);
            return { date: session.date, sets };
          }
        }
        return null;
      }, [username, exercise.name, workoutsDb, editSessionId]);

      return (
        <div className="glass-card bg-black/40 rounded-xl p-3 md:p-4 border border-white/5 relative overflow-hidden">
          {/* Subtle number background */}
          <div className="absolute -right-4 -top-6 text-[80px] font-header font-bold text-white/5 select-none pointer-events-none leading-none">
             {number}
          </div>

          <div className="flex gap-3 items-start mb-3 relative z-10 w-full pr-2">
             <button
               onClick={() => onOpenImage({ name: exercise.name, notes: exercise.notes, src: getExerciseImage(exercise.name), theme: theme })}
               className="w-12 h-12 shrink-0 rounded-lg overflow-hidden border border-white/20 btn-press group relative shadow-lg mt-0.5"
             >
               <div className="absolute inset-0 bg-black/40 group-hover:bg-transparent transition-colors z-10 flex items-center justify-center">
                   <IconPlay size={16} className="text-white opacity-60 group-hover:opacity-100 transition-opacity" />
               </div>
               <img src={getExerciseImage(exercise.name)} alt={exercise.name} className="w-full h-full object-cover filter brightness-75 group-hover:scale-110 transition-transform duration-500" />
             </button>
             
             <div className="flex-1 min-w-0">
               <div className="flex items-center gap-2 mb-0.5 flex-wrap">
                  <h3 className="text-lg sm:text-xl font-bold text-white/90 tracking-tight leading-tight truncate">
                    {exercise.name}
                  </h3>
                  <div className="bg-black/50 text-white/70 text-[9px] font-mono px-2 py-0.5 rounded border border-white/10 uppercase tracking-widest whitespace-nowrap shrink-0">
                    {state.targetSets}s • {exercise.targetReps}
                  </div>
               </div>
               <p className="text-white/50 text-[10px] flex items-start leading-snug line-clamp-1 sm:line-clamp-2 mt-1">
                 <IconInfo size={12} className="mr-1 mt-[1px] flex-shrink-0" />
                 {exercise.notes}
               </p>
             </div>
          </div>

          <div className="flex flex-col md:flex-row gap-2 mb-3 relative z-10">
             {/* Today's Target / Recommendation Banner */}
             {(state.pastRecWeight || state.pastRecReps) && (
                 <div className="flex-1 bg-amber-500/10 border border-amber-500/30 rounded-lg p-2 flex justify-between items-center">
                     <span className="text-[9px] text-amber-400 font-bold uppercase tracking-widest flex items-center">
                         <IconLightbulb size={12} className="mr-1" /> Target
                     </span>
                     <span className="text-amber-400 font-mono font-bold text-xs">
                         {state.pastRecWeight || '-'} lbs × {state.pastRecReps || '-'}
                     </span>
                 </div>
             )}

             {/* Last Session Box */}
             {lastSessionData ? (
               <div className="flex-1 bg-black/30 border border-white/5 rounded-lg p-2 flex justify-between items-center">
                 <span className="font-bold text-white/40 text-[9px] uppercase tracking-widest mr-2">Last Session</span>
                 <div className="text-white/80 font-mono text-xs">
                   {lastSessionData.sets.length}s <span className="text-white mx-0.5">{lastSessionData.sets[0]?.weight || 0}</span>×<span className="text-white ml-0.5">{lastSessionData.sets[0]?.reps || 0}</span>
                 </div>
               </div>
             ) : (
               <div className="flex-1 bg-black/30 border border-white/5 rounded-lg p-2 text-[10px] text-white/30 font-mono italic text-center">
                 NO PREVIOUS DATA
               </div>
             )}
          </div>

          <div className="flex gap-2 relative z-10">
            <div className="flex-1 bg-black/60 border border-white/10 rounded-lg p-2 focus-within:border-white/50 transition-all shadow-inner">
              <label className="text-[9px] text-white/40 font-bold tracking-widest uppercase mb-0.5 block">WEIGHT (LBS)</label>
              <input type="text" inputMode="decimal" value={state.weight} onChange={(e) => updateExercise(username, exercise.name, 'weight', e.target.value)} placeholder="0" className="w-full bg-transparent text-white font-mono text-2xl font-black focus:outline-none placeholder-white/10" />
            </div>
            <div className="flex-1 bg-black/60 border border-white/10 rounded-lg p-2 focus-within:border-white/50 transition-all shadow-inner">
              <label className="text-[9px] text-white/40 font-bold tracking-widest uppercase mb-0.5 block">REPS</label>
              <input type="number" inputMode="numeric" value={state.reps} onChange={(e) => updateExercise(username, exercise.name, 'reps', e.target.value)} placeholder="0" className="w-full bg-transparent text-white font-mono text-2xl font-black focus:outline-none placeholder-white/10" />
            </div>
            <div className="w-16 bg-black/60 border border-white/10 rounded-lg p-2 focus-within:border-red-500 transition-all shadow-inner">
              <label className="text-[9px] text-white/40 font-bold tracking-widest uppercase mb-0.5 block text-center">RPE</label>
              <input type="number" inputMode="numeric" value={state.rpe} onChange={(e) => updateExercise(username, exercise.name, 'rpe', e.target.value)} placeholder="-" className="w-full bg-transparent text-red-400 font-mono text-xl font-black focus:outline-none placeholder-white/10 text-center" />
            </div>
          </div>

          {/* Individual Exercise Notes & Next Session Recommendations */}
          <div className="mt-3 pt-3 border-t border-white/5 grid grid-cols-1 sm:grid-cols-2 gap-3 relative z-10">
             <div>
                 <div className="flex items-center mb-1">
                     <IconEdit size={10} className={`mr-1 ${theme.textClass}`} />
                     <label className="text-[9px] text-white/50 font-bold tracking-widest uppercase">Notes</label>
                 </div>
                 <textarea
                     value={state.note || ''}
                     onChange={(e) => updateExercise(username, exercise.name, 'note', e.target.value)}
                     placeholder="Form cues, machine settings..."
                     className={`w-full bg-black/40 border border-white/10 rounded-md p-2 text-[11px] text-white/80 focus:outline-none focus:border-white/30 transition-all h-[42px] resize-none placeholder-white/20`}
                 />
             </div>
             
             <div className="bg-black/30 border border-white/5 rounded-md p-2">
                 <label className="text-[9px] text-white/40 font-bold tracking-widest uppercase mb-1.5 block">Next Target</label>
                 <div className="flex gap-2">
                     <div className="flex-1">
                         <input 
                             type="text" inputMode="decimal"
                             value={state.recWeight || ''}
                             onChange={(e) => updateExercise(username, exercise.name, 'recWeight', e.target.value)}
                             placeholder="Lbs" 
                             className="w-full bg-black/50 border border-white/10 rounded py-1 px-2 text-amber-400 font-mono text-xs focus:outline-none focus:border-amber-500 transition-all text-center placeholder-white/20" 
                         />
                     </div>
                     <div className="flex-1">
                         <input 
                             type="number" inputMode="numeric"
                             value={state.recReps || ''}
                             onChange={(e) => updateExercise(username, exercise.name, 'recReps', e.target.value)}
                             placeholder="Reps" 
                             className="w-full bg-black/50 border border-white/10 rounded py-1 px-2 text-amber-400 font-mono text-xs focus:outline-none focus:border-amber-500 transition-all text-center placeholder-white/20" 
                         />
                     </div>
                 </div>
             </div>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    // CACHE BUSTING SERVICE WORKER SCRIPT
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Find existing service workers and completely destroy their cache
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
                registration.unregister();
                console.log("Old ServiceWorker unregistered to force update.");
            }
        });

        // Register a fresh Service Worker with a random version parameter to bust the iOS cache
        navigator.serviceWorker.register('sw.js?v=' + new Date().getTime())
          .then((registration) => {
            console.log('RC Fit ServiceWorker registered with scope:', registration.scope);
            registration.update();
          })
          .catch((error) => {
            console.warn('ServiceWorker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>

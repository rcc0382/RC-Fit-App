  <style>
    :root {
      --bg-dark: #121212;
      --bg-glass: rgba(25, 25, 25, 0.65);
      --border-glass: rgba(255, 255, 255, 0.06);
      
      --robby-primary: #00e5ff;
      --robby-secondary: #ff6a00;
      --robby-glow: rgba(0, 229, 255, 0.25);

      --candice-primary: #00f2ad;
      --candice-secondary: #b58cff;
      --candice-glow: rgba(0, 242, 173, 0.25);
    }
    
    body {
      background-color: var(--bg-dark);
      font-family: 'Inter', sans-serif;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(255,255,255,0.015) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(255,255,255,0.015) 0%, transparent 50%);
      overscroll-behavior-y: none; 
    }

    .font-header { font-family: 'Teko', sans-serif; text-transform: uppercase; }
    .font-mono { font-family: 'Roboto Mono', monospace; }
    
    .glass-card {
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-glass);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    .glow-robby { border-color: rgba(0, 229, 255, 0.2); box-shadow: 0 0 20px var(--robby-glow), inset 0 0 10px rgba(0, 229, 255, 0.05); }
    .glow-candice { border-color: rgba(0, 242, 173, 0.2); box-shadow: 0 0 20px var(--candice-glow), inset 0 0 10px rgba(0, 242, 173, 0.05); }

    .btn-press {
      transition: all 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent; 
    }
    .btn-press:active {
      transform: scale(0.96);
      filter: brightness(1.2);
    }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* Hide scrollbar for horizontal tabs */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Custom scrollbar for independent lists */
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
  </style>

    // --- MAIN APP COMPONENT ---
    function App() {
      const [workoutsDb, setWorkoutsDb] = useState([]);
      const [appSettings, setAppSettings] = useState({ Robby: DEFAULT_ROUTINES, Candice: DEFAULT_ROUTINES, CandiceCore: DEFAULT_CANDICE_CORE, CardioOptions: DEFAULT_CARDIO });
      const [loading, setLoading] = useState(true);
      const [activeUsers, setActiveUsers] = useState([]);
      const [selectedRoutines, setSelectedRoutines] = useState({});
      const [view, setView] = useState('dashboard');
      const [savedSession, setSavedSession] = useState(null);
      const [editSession, setEditSession] = useState(null);
      const [showSpreadsheet, setShowSpreadsheet] = useState(null); 
      const [showHeatmap, setShowHeatmap] = useState(null);
      const [showPlateCalc, setShowPlateCalc] = useState(false);

      const forceRefresh = () => {
          localStorage.clear();
          if ('caches' in window) caches.keys().then((names) => names.forEach(name => caches.delete(name)));
          if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(r => r.forEach(reg => reg.unregister()));
          setTimeout(() => { window.location.reload(true); }, 500);
      };

      useEffect(() => {
        let unsubscribeWorkouts = () => {};
        let unsubscribeSession = () => {};
        let unsubscribeRoutines = () => {};

        const initSync = async () => {
           try { await auth.signInAnonymously(); } catch(err) {}

           const basePath = `workouts`; // Clean path for main DB
           
           unsubscribeWorkouts = db.collection(basePath).onSnapshot(snapshot => {
                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                data.sort((a, b) => new Date(b.date) - new Date(a.date));
                setWorkoutsDb(data);
                setLoading(false);
           }, err => { setLoading(false); });

           unsubscribeSession = db.collection(`app_state`).doc('active_session').onSnapshot(doc => {
                if (doc.exists) setSavedSession(doc.data()); else setSavedSession(null);
           });

           unsubscribeRoutines = db.collection(`app_state`).doc('app_settings').onSnapshot(doc => {
                if (doc.exists) setAppSettings(prev => ({ ...prev, ...doc.data() }));
           });
        };

        initSync();
        return () => { unsubscribeWorkouts(); unsubscribeSession(); unsubscribeRoutines(); };
      }, []);

      const getNextWorkoutId = (username) => {
        const routines = appSettings[username] || DEFAULT_ROUTINES;
        const history = workoutsDb.filter(w => w.user === username);
        if (history.length === 0) return routines[0].id;
        const lastId = history[0].routineId;
        const idx = routines.findIndex(r => r.id === lastId);
        if (idx === -1 || idx === routines.length - 1) return routines[0].id;
        return routines[idx + 1].id;
      };

      const startWorkout = (users, routines) => { setActiveUsers(users); setSelectedRoutines(routines); setView('workout'); };
      const startEditWorkout = (session) => { setEditSession(session); setActiveUsers([session.user]); setSelectedRoutines({ [session.user]: session.routineId }); setView('workout'); };
      const resumeWorkout = () => { if (savedSession) { setActiveUsers(savedSession.users); setView('workout'); } };

      const handleSaveProgress = (users, sessionData) => {
        db.collection(`app_state`).doc('active_session').set({ users, sessionData });
        setView('dashboard'); setActiveUsers([]);
      };
      const clearSavedSession = () => { db.collection(`app_state`).doc('active_session').delete().catch(()=>{}); };

      const handleFinishWorkout = async (payloads) => {
        try {
          if (editSession) {
              await db.collection(`workouts`).doc(editSession.id).update({...payloads[0]});
          } else {
              const batch = db.batch();
              for (const p of payloads) {
                 batch.set(db.collection(`workouts`).doc(), {...p, date: new Date().toISOString()});
              }
              await batch.commit();
          }
          if (!editSession) clearSavedSession(); 
        } catch (err) {}
        setView('dashboard'); setActiveUsers([]); setEditSession(null);
      };

      const handleSaveSettings = async (newSettings) => {
        await db.collection(`app_state`).doc('app_settings').set(newSettings, { merge: true });
        setView('dashboard');
      };

      if (loading) return (
        <div className="min-h-screen flex flex-col items-center justify-center text-neutral-300 bg-[#121212]">
          <div className="w-10 h-10 border-4 border-indigo-500/30 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
          <p className="font-header text-sm tracking-widest text-neutral-500">SYNCING...</p>
        </div>
      );

      return (
        <div className="min-h-screen bg-neutral-950 text-neutral-100 p-2 md:p-6 pb-20 font-sans relative">
          {view === 'dashboard' && (
            <Dashboard workoutsDb={workoutsDb} onStart={startWorkout} getNextWorkoutId={getNextWorkoutId} savedSession={savedSession} onResume={resumeWorkout} forceRefresh={forceRefresh} appSettings={appSettings} onEditProtocol={() => setView('builder')} setShowSpreadsheet={setShowSpreadsheet} onTogglePlateCalc={() => setShowPlateCalc(true)} onToggleHeatmap={setShowHeatmap} />
          )}
          {view === 'workout' && (
            <ActiveWorkout users={activeUsers} selectedRoutines={selectedRoutines} workoutsDb={workoutsDb} onFinish={handleFinishWorkout} onSaveProgress={handleSaveProgress} onCancel={() => { if(!editSession) clearSavedSession(); setView('dashboard'); setActiveUsers([]); setEditSession(null); }} initialSessionData={savedSession && savedSession.users.join(',') === activeUsers.join(',') ? savedSession.sessionData : null} editSession={editSession} appSettings={appSettings} />
          )}
          {view === 'builder' && (
            <RoutineBuilder appSettings={appSettings} onSave={handleSaveSettings} onCancel={() => setView('dashboard')} />
          )}
          {showSpreadsheet && (
            <SpreadsheetModal workoutsDb={workoutsDb} userToShow={showSpreadsheet} onClose={() => setShowSpreadsheet(null)} onEditSession={(s) => {setShowSpreadsheet(null); startEditWorkout(s);}} appSettings={appSettings} />
          )}
          {showPlateCalc && <PlateLoaderModal onClose={() => setShowPlateCalc(false)} />}
          {showHeatmap && <RecoveryHeatmapModal user={showHeatmap} workoutsDb={workoutsDb} onClose={() => setShowHeatmap(null)} />}
        </div>
      );
    }

              {workoutsDb.slice(0, 4).map((w, i) => {
                 const themeText = w.user === 'Robby' ? 'text-[var(--robby-primary)]' : 'text-[var(--candice-primary)]';
                 const glowClass = w.user === 'Robby' ? 'hover:shadow-[0_0_10px_var(--robby-glow)] hover:border-[var(--robby-primary)]' : 'hover:shadow-[0_0_10px_var(--candice-glow)] hover:border-[var(--candice-primary)]';

                 return (
                   <button key={w.id} onClick={() => setSelectedHistory(w)} className={`glass-card rounded-xl p-3 flex flex-col justify-start text-left transition-all h-[200px] group btn-press ${glowClass}`}>
                     <div className="flex justify-between items-start mb-2 w-full">
                        <span className={`inline-block px-1.5 py-0.5 rounded text-[8px] font-bold uppercase tracking-widest bg-white/5 ${themeText}`}>{w.user}</span>
                        <span className="text-[8px] font-mono text-white/40">{new Date(w.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</span>
                     </div>
                     <p className="font-header text-lg tracking-widest text-white mb-2 leading-none">{w.routineId}</p>
                     
                     <div className="flex-1 overflow-y-auto w-full space-y-1.5 pr-1 text-[10px]">
                        {Object.entries(w.exercises).map(([exName, exData]) => {
                           const sets = Array.isArray(exData) ? exData : (exData.sets || []);
                           return (
                              <div key={exName} className="flex justify-between items-start gap-2 border-b border-white/5 pb-1">
                                 <span className="text-white/60 truncate max-w-[65%]">{exName}</span>
                                 <span className="text-white/40 font-mono whitespace-nowrap">{sets.length} sets</span>
                              </div>
                           );
                        })}
                     </div>
                   </button>
                 )
              })}
            </div>
          </div>

          {selectedHistory && (
             <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[70] p-4" onClick={() => setSelectedHistory(null)}>
                <div className="glass-card rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}>
                   <div className="p-4 border-b border-white/10 flex justify-between items-center bg-black/40">
                      <div>
                         <div className="flex items-center gap-2 mb-1">
                            <span className={`inline-block px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-widest bg-white/5 ${selectedHistory.user === 'Robby' ? 'text-[var(--robby-primary)]' : 'text-[var(--candice-primary)]'}`}>
                               {selectedHistory.user}
                            </span>
                            <h3 className="text-xl font-header tracking-widest text-white leading-none mt-1">{selectedHistory.routineId}</h3>
                         </div>
                      </div>
                      <button onClick={() => setSelectedHistory(null)} className="text-white/50 hover:text-white bg-black/50 p-1.5 rounded-full transition-colors btn-press"><IconX size={16} /></button>
                   </div>
                   <div className="p-4 max-h-[60vh] overflow-y-auto space-y-3">
                      {Object.entries(selectedHistory.exercises).map(([exName, exData]) => {
                         const sets = Array.isArray(exData) ? exData : (exData.sets || []);
                         return (
                            <div key={exName} className="glass-card bg-black/20 rounded-xl p-3 border border-white/5">
                               <h4 className="font-bold text-white/90 text-xs mb-2">{exName}</h4>
                               <div className="flex flex-wrap gap-2">
                                  {sets.map((set, i) => (
                                     <div key={i} className="bg-black/40 px-2 py-1 rounded text-white/60 font-mono text-[10px] border border-white/5">
                                        {i+1}: <span className="text-white font-bold">{set.weight}</span> x <span className="text-white font-bold">{set.reps}</span>
                                     </div>
                                  ))}
                               </div>
                            </div>
                         );
                      })}
                      {selectedHistory.cardioType && (
                          <div className="glass-card bg-black/20 rounded-xl p-3 border border-white/5 mt-2">
                              <h4 className="font-bold text-white/90 text-xs mb-1 flex items-center"><IconActivity size={12} className="mr-1"/> Cardio</h4>
                              <div className="text-white/60 font-mono text-[10px] pl-2">
                                  {selectedHistory.cardioType} — {selectedHistory.cardioDuration} min
                              </div>
                          </div>
                      )}
                   </div>
                </div>
             </div>
          )}
        </div>
      );
    }

    // --- ACTIVE WORKOUT (COMPACT & DUAL SCROLL) ---
    function ActiveWorkout({ users, selectedRoutines, workoutsDb, onFinish, onSaveProgress, onCancel, initialSessionData, editSession, appSettings }) {
      const [sessionData, setSessionData] = useState(() => {
        if (initialSessionData && !editSession) return initialSessionData;
        const init = {};
        users.forEach(username => {
          const rId = selectedRoutines[username];
          const routines = appSettings[username] || DEFAULT_ROUTINES;
          const r = routines.find(x => x.id === rId) || routines[0];
          const exState = {};
          
          const getPrev = (name) => {
             if(editSession && editSession.user === username && editSession.exercises[name]) return editSession.exercises[name];
             const history = workoutsDb.filter(w => w.user === username).sort((a,b)=>new Date(b.date)-new Date(a.date));
             for(let h of history) if(h.exercises[name]) return h.exercises[name];
             return null;
          };

          r.exercises.forEach(ex => {
             const prev = getPrev(ex.name);
             const sets = prev && Array.isArray(prev) ? prev : Array(ex.targetSets).fill({weight:'', reps:''});
             exState[ex.name] = { sets, targetSets: ex.targetSets, notes: ex.notes, recWeight: '', recReps: '' };
          });

          if (username === 'Candice' && appSettings.CandiceCore) {
             appSettings.CandiceCore.exercises.forEach(ex => {
                const prev = getPrev(ex.name);
                const sets = prev && Array.isArray(prev) ? prev : Array(ex.targetSets).fill({weight:'BW', reps:''});
                exState[ex.name] = { sets, targetSets: ex.targetSets, notes: ex.notes, isCore: true };
             });
          }
          init[username] = { routineId: rId, exercises: exState, cardioType: editSession?.cardioType||'', cardioDuration: editSession?.cardioDuration||'' };
        });
        return init;
      });

      const updateSet = (user, exName, setIdx, field, val) => {
         setSessionData(p => {
            const upd = {...p};
            upd[user].exercises[exName].sets[setIdx][field] = val;
            return upd;
         });
      };
      
      const submit = () => {
         const payloads = users.map(u => {
            const cleans = {};
            Object.entries(sessionData[u].exercises).forEach(([n, d]) => {
               const valids = d.sets.filter(s => s.weight!=='' && s.reps!=='');
               if(valids.length > 0) cleans[n] = valids;
            });
            return { user: u, routineId: sessionData[u].routineId, exercises: cleans, cardioType: sessionData[u].cardioType, cardioDuration: sessionData[u].cardioDuration };
         });
         onFinish(payloads);
      };

      const isDual = users.length === 2;

      return (
         <div className={`w-full max-w-[1600px] mx-auto p-1 md:p-2 ${isDual ? 'h-[95vh] flex flex-col' : 'pb-24'}`}>
            <div className="flex items-center justify-between mb-2 shrink-0 px-2 bg-black/50 p-2 rounded-lg border border-white/5">
               <button onClick={onCancel} className="text-white/40 hover:text-red-400 text-[10px] font-bold uppercase tracking-widest btn-press">&lt; Abort</button>
               <div className="flex gap-2">
                  {!editSession && <button onClick={()=>onSaveProgress(users, sessionData)} className="bg-white/10 text-white/80 px-3 py-1 rounded text-[10px] font-bold btn-press">Pause</button>}
                  <button onClick={submit} className="bg-white text-black px-4 py-1 rounded text-xs font-bold shadow-[0_0_10px_rgba(255,255,255,0.3)] btn-press">Log Session</button>
               </div>
            </div>

            <div className={`grid grid-cols-1 ${isDual ? 'md:grid-cols-2 gap-2 h-full min-h-0' : 'max-w-2xl mx-auto gap-4'} items-start`}>
               {users.map(u => {
                  const rId = sessionData[u].routineId;
                  const routines = appSettings[u] || DEFAULT_ROUTINES;
                  const routine = routines.find(r => r.id === rId) || routines[0];
                  const theme = u === 'Robby' ? { color: 'var(--robby-primary)', border: 'border-[var(--robby-primary)]' } : { color: 'var(--candice-primary)', border: 'border-[var(--candice-primary)]' };

                  return (
                     <div key={u} className={`glass-card rounded-xl flex flex-col overflow-hidden border border-white/5 shadow-xl ${isDual ? 'h-full min-h-0' : ''}`}>
                        {/* Compact Header */}
                        <div className="h-16 relative overflow-hidden shrink-0 border-b border-white/10">
                           <div className="absolute inset-0 bg-cover bg-center opacity-30 mix-blend-luminosity" style={{ backgroundImage: `url('${getDailyImage(u)}')` }}></div>
                           <div className="absolute inset-0 bg-gradient-to-t from-[#121212] to-transparent"></div>
                           <div className="absolute bottom-1 left-3 flex items-end gap-2">
                               <h2 className="text-2xl font-header tracking-widest text-white leading-none">{u}</h2>
                               <span className="text-[9px] font-bold uppercase tracking-widest mb-0.5" style={{color: theme.color}}>{routine.id}</span>
                           </div>
                        </div>

                        {/* Independent Scrolling List */}
                        <div className="flex-1 overflow-y-auto p-2 md:p-3 space-y-3 custom-scrollbar">
                           {routine.exercises.map((ex, idx) => (
                              <div key={ex.name} className="bg-black/50 border border-white/5 rounded-lg p-2.5 shadow-inner">
                                 <div className="flex justify-between items-start mb-2">
                                    <h3 className="text-sm font-bold text-white leading-tight w-[70%] truncate"><span style={{color: theme.color}} className="mr-1">{idx+1}.</span>{ex.name}</h3>
                                    <span className="text-[8px] bg-white/5 px-1.5 py-0.5 rounded font-mono text-white/50">{ex.targetSets}s • {ex.targetReps}</span>
                                 </div>
                                 <div className="space-y-1.5 pl-4 border-l-2" style={{borderColor: `${theme.color}40`}}>
                                    {sessionData[u].exercises[ex.name].sets.map((s, sIdx) => (
                                       <div key={sIdx} className="flex gap-2 items-center">
                                          <span className="text-[9px] font-mono text-white/30 w-3">{sIdx+1}</span>
                                          <input type="text" inputMode="decimal" value={s.weight} onChange={e=>updateSet(u, ex.name, sIdx, 'weight', e.target.value)} placeholder="Lbs" className="flex-1 bg-black/60 border border-white/10 rounded py-1 px-2 text-white font-black text-sm outline-none focus:border-white/40 text-center" />
                                          <input type="number" inputMode="numeric" value={s.reps} onChange={e=>updateSet(u, ex.name, sIdx, 'reps', e.target.value)} placeholder="Reps" className="flex-1 bg-black/60 border border-white/10 rounded py-1 px-2 text-white font-black text-sm outline-none focus:border-white/40 text-center" />
                                       </div>
                                    ))}
                                 </div>
                              </div>
                           ))}

                           {u === 'Candice' && appSettings.CandiceCore && (
                              <div className="mt-4 pt-3 border-t border-white/10">
                                 <h3 className="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-2 flex items-center"><IconCheckCircle size={12} className="mr-1"/> {appSettings.CandiceCore.title}</h3>
                                 <div className="space-y-3">
                                    {appSettings.CandiceCore.exercises.map((ex, idx) => (
                                       <div key={ex.name} className="bg-black/50 border border-emerald-900/30 rounded-lg p-2.5 shadow-inner">
                                          <div className="flex justify-between items-start mb-2">
                                             <h3 className="text-xs font-bold text-white leading-tight w-[70%] truncate">{ex.name}</h3>
                                             <span className="text-[8px] bg-white/5 px-1.5 py-0.5 rounded font-mono text-white/50">{ex.targetSets}s • {ex.targetReps}</span>
                                          </div>
                                          <div className="space-y-1.5 pl-4 border-l-2 border-emerald-900/50">
                                             {sessionData[u].exercises[ex.name].sets.map((s, sIdx) => (
                                                <div key={sIdx} className="flex gap-2 items-center">
                                                   <span className="text-[9px] font-mono text-white/30 w-3">{sIdx+1}</span>
                                                   <input type="text" inputMode="decimal" value={s.weight} onChange={e=>updateSet(u, ex.name, sIdx, 'weight', e.target.value)} placeholder="Lbs" className="flex-1 bg-black/60 border border-white/10 rounded py-1 px-2 text-white font-bold text-xs outline-none text-center" />
                                                   <input type="number" inputMode="numeric" value={s.reps} onChange={e=>updateSet(u, ex.name, sIdx, 'reps', e.target.value)} placeholder="Reps" className="flex-1 bg-black/60 border border-white/10 rounded py-1 px-2 text-white font-bold text-xs outline-none text-center" />
                                                </div>
                                             ))}
                                          </div>
                                       </div>
                                    ))}
                                 </div>
                              </div>
                           )}
                           
                           {/* Cardio */}
                           <div className="mt-4 pt-3 border-t border-white/10 pb-4">
                              <div className="flex flex-row gap-2">
                                 <select value={sessionData[u].cardioType||''} onChange={e=>setSessionData(p=>{const n={...p}; n[u].cardioType=e.target.value; return n;})} className="flex-[2] bg-black/60 border border-white/10 rounded p-1.5 text-[10px] font-bold text-white/80 outline-none">
                                    <option value="">Cardio (Opt)</option>
                                    {(appSettings.CardioOptions || DEFAULT_CARDIO).map(c=><option key={c} value={c}>{c}</option>)}
                                 </select>
                                 <input type="number" value={sessionData[u].cardioDuration||''} onChange={e=>setSessionData(p=>{const n={...p}; n[u].cardioDuration=e.target.value; return n;})} placeholder="Min" className="flex-1 bg-black/60 border border-white/10 rounded p-1.5 text-[10px] font-bold text-center text-white outline-none" />
                              </div>
                           </div>
                        </div>
                     </div>
                  );
               })}
            </div>
         </div>
      );
    }

    // --- SPREADSHEET MODAL (EXCEL VIEW) ---
    function SpreadsheetModal({ workoutsDb, userToShow, onClose, onEditSession, appSettings }) {
       const userWorkouts = useMemo(() => workoutsDb.filter(w => w.user === userToShow).sort((a,b)=>new Date(a.date)-new Date(b.date)), [workoutsDb, userToShow]);
       const activeRoutines = appSettings[userToShow] || DEFAULT_ROUTINES;
       
       const dates = useMemo(() => userWorkouts.map(w => ({id: w.id, str: new Date(w.date).toLocaleDateString(undefined, {month:'numeric',day:'numeric'}), session: w})), [userWorkouts]);
       
       // Gather all unique exercises ever logged
       const allExercises = useMemo(() => {
           const set = new Set();
           userWorkouts.forEach(w => Object.keys(w.exercises).forEach(e => set.add(e)));
           return Array.from(set);
       }, [userWorkouts]);

       const themeText = userToShow === 'Robby' ? 'text-[var(--robby-primary)]' : 'text-[var(--candice-primary)]';

       return (
          <div className="fixed inset-0 bg-black/95 backdrop-blur-sm flex items-center justify-center z-[60] p-1 md:p-4" onClick={onClose}>
             <div className="glass-card rounded-lg w-full max-w-[98vw] h-[95vh] flex flex-col border border-white/10" onClick={e => e.stopPropagation()}>
                <div className="p-3 border-b border-white/10 flex justify-between items-center bg-black/60 shrink-0">
                   <h2 className="text-xl font-header tracking-widest text-white flex items-center"><IconTable size={16} className={`mr-2 ${themeText}`}/> {userToShow} History</h2>
                   <button onClick={onClose} className="text-white/50 hover:text-white p-1 bg-white/5 rounded btn-press"><IconX size={16} /></button>
                </div>
                
                <div className="flex-1 overflow-auto bg-[#0a0a0a] relative custom-scrollbar">
                   <table className="w-full text-left border-collapse text-[10px] whitespace-nowrap font-mono">
                      <thead className="sticky top-0 z-20 bg-[#151515] shadow-md">
                         <tr>
                            <th className="p-2 border-b border-r border-white/10 text-white/50 sticky left-0 bg-[#151515] z-30 uppercase tracking-widest min-w-[120px]">Exercise</th>
                            {dates.map(d => (
                               <th key={d.id} className="p-2 border-b border-r border-white/10 text-center text-white/80 cursor-pointer hover:bg-white/5 transition-colors" onClick={()=>onEditSession(d.session)} title="Edit Session">
                                  {d.str}
                               </th>
                            ))}
                         </tr>
                      </thead>
                      <tbody>
                         {allExercises.map((ex, i) => (
                            <tr key={ex} className="hover:bg-white/5 transition-colors border-b border-white/5">
                               <td className="p-2 border-r border-white/10 sticky left-0 bg-[#111] z-10 text-white font-sans font-bold max-w-[150px] truncate shadow-[2px_0_5px_rgba(0,0,0,0.5)]">{ex}</td>
                               {userWorkouts.map(w => {
                                  const exData = w.exercises[ex];
                                  let txt = '-';
                                  if(exData && Array.isArray(exData) && exData.length>0) {
                                      txt = exData.map(s => `${s.weight}x${s.reps}`).join(', ');
                                  }
                                  return <td key={w.id} className="p-2 border-r border-white/5 text-center text-white/60">{txt}</td>;
                               })}
                            </tr>
                         ))}
                         {/* Cardio Row */}
                         <tr className="bg-white/5 border-t border-white/20">
                             <td className={`p-2 border-r border-white/10 sticky left-0 bg-[#151515] z-10 font-sans font-bold shadow-[2px_0_5px_rgba(0,0,0,0.5)] ${themeText}`}>CARDIO</td>
                             {userWorkouts.map(w => (
                                 <td key={w.id} className="p-2 border-r border-white/5 text-center text-white/60">{w.cardioType && w.cardioDuration ? `${w.cardioType} (${w.cardioDuration}m)` : '-'}</td>
                             ))}
                         </tr>
                      </tbody>
                   </table>
                </div>
             </div>
          </div>
       );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.getRegistrations().then(r => r.forEach(reg => reg.unregister()));
        navigator.serviceWorker.register('sw.js?v=' + new Date().getTime());
      });
    }
  </script>
</body>
</html>
